<!doctype html>
<html lang="ar" dir="rtl">
<head>
  
<script>
/* JK hard reset once per version (fix stuck Service Worker / cache on mobile) */
(async ()=>{
  try {
    const V="17";
    const key="jk_sw_v";
    const prev=localStorage.getItem(key);
    if(prev!==V && "serviceWorker" in navigator){
      localStorage.setItem(key,V);
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
      if(window.caches){
        const keys = await caches.keys();
        await Promise.all(keys.map(k=>caches.delete(k)));
      }
      location.reload();
    }
  } catch(e) {}
})();
</script>
<meta charset="utf-8"/>

  <script src="product.js?v=17"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js?v=17").then((reg)=>{
        try{ reg.update(); }catch(e){}
        const kick = () => {
          if(reg.waiting){ try{ reg.waiting.postMessage('SKIP_WAITING'); }catch(e){} }
        };
        kick();
        reg.addEventListener('updatefound', ()=>{
          const sw = reg.installing;
          if(!sw) return;
          sw.addEventListener('statechange', ()=>{ if(sw.state==='installed') kick(); });
        });
        navigator.serviceWorker.addEventListener("controllerchange", ()=>{ window.location.reload(); });
      }).catch(()=>{});
    }
  </script>
